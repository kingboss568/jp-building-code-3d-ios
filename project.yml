name: BuildingCode3D
options:
  bundleIdPrefix: com.jiangyushiung
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 842FV34L9S
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      CODE_SIGNING_ALLOWED: "NO"
targets:
  BuildingCode3D:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BuildingCode3D
    info:
      path: BuildingCode3D/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: ja
        CFBundleDisplayName: 建築基準法令3D図解
        CFBundleName: 建築基準法令3D図解
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiangyushiung.jpbuildingcode3d
        PRODUCT_NAME: BuildingCode3D
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - BuildingCode3DUnitTests
        - BuildingCode3DUITests
  BuildingCode3DUnitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/UnitTests
    dependencies:
      - target: BuildingCode3D
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiangyushiung.jpbuildingcode3d.tests
  BuildingCode3DUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/UITests
    dependencies:
      - target: BuildingCode3D
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiangyushiung.jpbuildingcode3d.uitests
        TEST_TARGET_NAME: BuildingCode3D
schemes:
  BuildingCode3D:
    build:
      targets:
        BuildingCode3D: all
    run:
      config: Debug
      storeKitConfiguration: BuildingCode3D/Resources/Configuration.storekit
    test:
      config: Debug
      targets:
        - BuildingCode3DUnitTests
        - BuildingCode3DUITests
    archive:
      config: Release
